<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>People — Bristol Paleo Modelling Group</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; color: #1a1a1a; font-size: 15px; line-height: 1.7; }

    /* — Navigation — */
    .nav {
      display: flex; justify-content: space-between; align-items: center;
      padding: 0.9rem 2rem; border-bottom: 1px solid #e8e8e8;
      background: #fff; position: sticky; top: 0; z-index: 10;
    }
    .nav-brand { display: flex; align-items: center; gap: 10px; text-decoration: none; }
    .nav-logo-box {
      width: 38px; height: 38px; background: #993C1D; border-radius: 4px;
      display: flex; align-items: center; justify-content: center;
      color: #fff; font-weight: 600; font-size: 12px; letter-spacing: .04em; flex-shrink: 0;
    }
    .nav-brand-text { font-size: 14px; font-weight: 600; color: #1a1a1a; line-height: 1.2; }
    .nav-brand-text span { display: block; font-size: 11px; color: #777; font-weight: 400; }
    .nav-links { display: flex; gap: 1.5rem; list-style: none; }
    .nav-links a { font-size: 15px; color: #555; text-decoration: none; }
    .nav-links a:hover { color: #993C1D; }
    .nav-links a.active { color: #993C1D; font-weight: 600; }

    /* — Page header — */
    .page-header { padding: 2rem 2rem 0; }
    .breadcrumb { font-size: 12px; color: #999; }
    .breadcrumb a { color: #999; text-decoration: none; }
    .breadcrumb a:hover { color: #993C1D; }

    /* — Profile layout — */
    .profile {
      display: grid;
      grid-template-columns: 240px 1fr;
      gap: 3rem;
      padding: 2rem 2rem 3rem;
      max-width: 960px;
    }

    /* — Left column — */
    .profile-photo {
      width: 100%; aspect-ratio: 1 / 1;
      border-radius: 10px; overflow: hidden;
      background: #f5c4b3;
      display: flex; align-items: center; justify-content: center;
    }
    .profile-photo img { width: 100%; height: 100%; object-fit: cover; }
    .profile-photo .placeholder-icon { font-size: 64px; color: #c07060; }

    .profile-links { margin-top: 1rem; display: flex; flex-direction: column; gap: 0.5rem; }
    .profile-link {
      display: flex; align-items: center; gap: 0.5rem;
      font-size: 13px; color: #555; text-decoration: none;
    }
    .profile-link:hover { color: #993C1D; }
    .profile-link i { font-size: 16px; color: #993C1D; flex-shrink: 0; }

    /* — Right column — */
    .profile-name { font-size: 26px; font-weight: 600; margin-bottom: 0.2rem; }
    .profile-title { font-size: 14px; color: #777; margin-bottom: 1.5rem; line-height: 1.5; }

    .profile-section { margin-bottom: 2rem; }
    .profile-section h2 {
      font-size: 13px; font-weight: 600; color: #993C1D;
      text-transform: uppercase; letter-spacing: 0.06em;
      margin-bottom: 0.75rem;
    }
    .profile-section p { font-size: 14px; color: #444; line-height: 1.85; }

    /* — Loading / error — */
    .status { padding: 3rem 2rem; color: #999; font-size: 14px; }

    /* — Footer — */
    footer {
      background: #faf8f7; padding: 1.5rem 2rem;
      border-top: 1px solid #e8e8e8;
      display: flex; justify-content: space-between; align-items: center;
      font-size: 12px; color: #999;
    }

    /* — Responsive — */
    @media (max-width: 680px) {
      .nav-links { display: none; }
      .profile { grid-template-columns: 1fr; gap: 1.5rem; }
      .profile-photo { max-width: 180px; }
    }
  </style>
</head>
<body>

<nav class="nav">
  <a class="nav-brand" href="../index.html">
    <div class="nav-logo-box">PMG</div>
    <div class="nav-brand-text">
      Bristol Paleo Modelling Group
      <span>Fig Text University · Fig Text Department</span>
    </div>
  </a>
  <ul class="nav-links">
    <li><a href="../index.html">Home</a></li>
    <li><a href="../publications.html">Publications</a></li>
    <li><a href="../model-outputs.html">Model Outputs</a></li>
    <li><a href="../people.html" class="active">People</a></li>
    <li><a href="../socials.html">Group Socials</a></li>
    <li><a href="../group-meeting.html">Group Meetings</a></li>
    <li><a href="../join.html">Join Us</a></li>
  </ul>
</nav>

<div class="page-header">
  <div class="breadcrumb"><a href="../index.html">Home</a> / <a href="../people.html">People</a> / <span id="breadcrumb-name">...</span></div>
</div>

<div id="profile-container">
  <div class="status">Loading...</div>
</div>

<footer>
  <span>© 2025 Bristol Paleo Modelling Group</span>
  <span>Fig Text University</span>
</footer>

<script>
  const SHEET_CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTOFWHEZ7i4l_h51ZY4UUVICD28fP4COlQzxkp_kc-uiWDktWy7Lw6l_l7PM4ZvuiTH8KGPQFeCjfzF/pub?output=csv';

  function resolvePhoto(url) {
    if (!url) return '';
    const match = url.match(/\/file\/d\/([^/]+)/);
    if (match) return `https://drive.google.com/thumbnail?id=${match[1]}&sz=w400`;
    return url;
  }

  function parseCSV(text) {
    const lines = text.trim().split('\n');
    const headers = lines[0].split(',').map(h => h.trim().replace(/^"|"$/g, '').toLowerCase());
    return lines.slice(1).map(line => {
      const values = [];
      let current = '', inQuotes = false;
      for (let i = 0; i < line.length; i++) {
        const ch = line[i];
        if (ch === '"') { inQuotes = !inQuotes; }
        else if (ch === ',' && !inQuotes) { values.push(current.trim()); current = ''; }
        else { current += ch; }
      }
      values.push(current.trim());
      const obj = {};
      headers.forEach((h, i) => obj[h] = (values[i] || '').replace(/^"|"$/g, '').trim());
      return obj;
    }).filter(row => row.name);
  }

  async function loadProfile() {
    const params = new URLSearchParams(window.location.search);
    const targetName = params.get('name');

    if (!targetName) {
      document.getElementById('profile-container').innerHTML = '<div class="status">No person specified.</div>';
      return;
    }

    try {
      const res = await fetch(SHEET_CSV_URL);
      const text = await res.text();
      const people = parseCSV(text);
      const person = people.find(p => p.name.toLowerCase() === targetName.toLowerCase());

      if (!person) {
        document.getElementById('profile-container').innerHTML = '<div class="status">Person not found.</div>';
        return;
      }

      document.title = `${person.name} — Bristol Paleo Modelling Group`;
      document.getElementById('breadcrumb-name').textContent = person.name;

      const photoUrl = resolvePhoto(person.photo);
      const photoHtml = photoUrl
        ? `<img src="${photoUrl}" alt="${person.name}" onerror="this.parentElement.innerHTML='<i class=\\'ti ti-user placeholder-icon\\'></i>'">`
        : `<i class="ti ti-user placeholder-icon"></i>`;

      const links = [
        person.website ? `<a class="profile-link" href="${person.website}" target="_blank"><i class="ti ti-world"></i> Personal website</a>` : '',
        person.email   ? `<a class="profile-link" href="mailto:${person.email}"><i class="ti ti-mail"></i> ${person.email}</a>` : '',
        person.scholar ? `<a class="profile-link" href="${person.scholar}" target="_blank"><i class="ti ti-brand-google-scholar"></i> Google Scholar</a>` : '',
      ].join('');

      const bioHtml = person.bio
        ? `<div class="profile-section"><h2>About</h2><p>${person.bio}</p></div>`
        : '';

      document.getElementById('profile-container').innerHTML = `
        <div class="profile">
          <div>
            <div class="profile-photo">${photoHtml}</div>
            <div class="profile-links">${links}</div>
          </div>
          <div>
            <div class="profile-name">${person.name}</div>
            <div class="profile-title">
              ${person.role || ''}${person.affiliation ? ' · ' + person.affiliation : ''}
            </div>
            ${bioHtml}
          </div>
        </div>`;

    } catch (err) {
      document.getElementById('profile-container').innerHTML = '<div class="status">Failed to load profile. Please try again later.</div>';
    }
  }

  loadProfile();
</script>

</body>
</html>
