<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>People — Bristol Paleo Modelling Group</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; color: #1a1a1a; font-size: 15px; line-height: 1.7; }

    /* — Navigation — */
    .nav {
      display: flex; justify-content: space-between; align-items: center;
      padding: 0.9rem 2rem; border-bottom: 1px solid #e8e8e8;
      background: #fff; position: sticky; top: 0; z-index: 10;
    }
    .nav-brand { display: flex; align-items: center; gap: 10px; text-decoration: none; }
    .nav-logo-box {
      width: 38px; height: 38px; background: #993C1D; border-radius: 4px;
      display: flex; align-items: center; justify-content: center;
      color: #fff; font-weight: 600; font-size: 12px; letter-spacing: .04em; flex-shrink: 0;
    }
    .nav-brand-text { font-size: 14px; font-weight: 600; color: #1a1a1a; line-height: 1.2; }
    .nav-brand-text span { display: block; font-size: 11px; color: #777; font-weight: 400; }
    .nav-links { display: flex; gap: 1.5rem; list-style: none; }
    .nav-links a { font-size: 15px; color: #555; text-decoration: none; }
    .nav-links a:hover { color: #993C1D; }
    .nav-links a.active { color: #993C1D; font-weight: 600; }

    /* — Page header — */
    .page-header { padding: 2.5rem 2rem 1.5rem; border-bottom: 1px solid #e8e8e8; }
    .breadcrumb { font-size: 12px; color: #999; margin-bottom: 0.5rem; }
    .breadcrumb a { color: #999; text-decoration: none; }
    .breadcrumb a:hover { color: #993C1D; }
    .page-header h1 { font-size: 28px; font-weight: 600; }

    /* — People sections — */
    .people-section { padding: 2.5rem 2rem; }
    .people-section + .people-section { border-top: 1px solid #e8e8e8; }
    .section-title {
      font-size: 16px; font-weight: 600; color: #993C1D;
      text-transform: uppercase; letter-spacing: 0.06em;
      margin-bottom: 1.75rem;
    }
    .people-section:empty { display: none; }

    /* — People grid — */
    .people-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 1.5rem;
    }
    .person-card {
      display: flex; flex-direction: column;
      text-decoration: none; color: inherit;
      cursor: pointer;
    }
    .person-photo {
      width: 100%; aspect-ratio: 1 / 1;
      border-radius: 8px; overflow: hidden;
      background: #f5c4b3;
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 0.75rem;
      transition: opacity 0.15s;
    }
    .person-card:hover .person-photo { opacity: 0.85; }
    .person-photo img { width: 100%; height: 100%; object-fit: cover; }
    .person-photo .placeholder-icon { font-size: 48px; color: #c07060; }
    .person-name { font-size: 14px; font-weight: 600; margin-bottom: 0.15rem; }
    .person-role { font-size: 12px; color: #777; margin-bottom: 0.4rem; line-height: 1.4; }
    .person-links { display: flex; gap: 0.5rem; }
    .person-links a { font-size: 15px; color: #aaa; text-decoration: none; transition: color 0.15s; }
    .person-links a:hover { color: #993C1D; }

    /* — Loading state — */
    .loading { padding: 3rem 2rem; color: #999; font-size: 14px; }

    /* — Footer — */
    footer {
      background: #faf8f7; padding: 1.5rem 2rem;
      border-top: 1px solid #e8e8e8;
      display: flex; justify-content: space-between; align-items: center;
      font-size: 12px; color: #999;
    }

    /* — Responsive — */
    @media (max-width: 680px) {
      .nav-links { display: none; }
      .people-grid { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); }
    }
  </style>
</head>
<body>

<nav class="nav">
  <a class="nav-brand" href="index.html">
    <div class="nav-logo-box">PMG</div>
    <div class="nav-brand-text">
      Bristol Paleo Modelling Group
      <span>Fig Text University · Fig Text Department</span>
    </div>
  </a>
  <ul class="nav-links">
    <li><a href="index.html">Home</a></li>
    <li><a href="publications.html">Publications</a></li>
    <li><a href="model-outputs.html">Model Outputs</a></li>
    <li><a href="people.html" class="active">People</a></li>
    <li><a href="socials.html">Group Socials</a></li>
    <li><a href="group-meeting.html">Group Meetings</a></li>
    <li><a href="join.html">Join Us</a></li>
  </ul>
</nav>

<div class="page-header">
  <div class="breadcrumb"><a href="index.html">Home</a> / People</div>
  <h1>People</h1>
</div>

<div id="people-container">
  <div class="loading">Loading...</div>
</div>

<footer>
  <span>© 2025 Bristol Paleo Modelling Group</span>
  <span>Fig Text University</span>
</footer>

<script>
  const SHEET_CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTOFWHEZ7i4l_h51ZY4UUVICD28fP4COlQzxkp_kc-uiWDktWy7Lw6l_l7PM4ZvuiTH8KGPQFeCjfzF/pub?output=csv';

  const SECTIONS = [
    { key: 'pi',       label: 'PIs' },
    { key: 'postdoc',  label: 'Research Fellows and Postdocs' },
    { key: 'pgr',      label: 'Postgraduate Researcher' },
    { key: 'visitor',  label: 'Visitors' },
  ];

  function resolvePhoto(url) {
    if (!url) return '';
    const match = url.match(/\/file\/d\/([^/]+)/);
    if (match) return `https://drive.google.com/thumbnail?id=${match[1]}&sz=w400`;
    return url;
  }

  function parseCSV(text) {
    const lines = text.trim().split('\n');
    const headers = lines[0].split(',').map(h => h.trim().replace(/^"|"$/g, '').toLowerCase());
    return lines.slice(1).map(line => {
      const values = [];
      let current = '', inQuotes = false;
      for (let i = 0; i < line.length; i++) {
        const ch = line[i];
        if (ch === '"') { inQuotes = !inQuotes; }
        else if (ch === ',' && !inQuotes) { values.push(current.trim()); current = ''; }
        else { current += ch; }
      }
      values.push(current.trim());
      const obj = {};
      headers.forEach((h, i) => obj[h] = (values[i] || '').replace(/^"|"$/g, '').trim());
      return obj;
    }).filter(row => row.name);
  }

  function personCard(person) {
    const photoUrl = resolvePhoto(person.photo);
    const photoSrc = photoUrl
      ? `<img src="${photoUrl}" alt="${person.name}" onerror="this.parentElement.innerHTML='<i class=\\'ti ti-user placeholder-icon\\'></i>'">`
      : `<i class="ti ti-user placeholder-icon"></i>`;

    const profilePage = `people/profile.html?name=${encodeURIComponent(person.name)}`;

    const links = [
      person.website ? `<a href="${person.website}" title="Website" onclick="event.stopPropagation()"><i class="ti ti-world"></i></a>` : '',
      person.email    ? `<a href="mailto:${person.email}" title="Email" onclick="event.stopPropagation()"><i class="ti ti-mail"></i></a>` : '',
      person.scholar  ? `<a href="${person.scholar}" title="Google Scholar" onclick="event.stopPropagation()"><i class="ti ti-brand-google-scholar"></i></a>` : '',
    ].join('');

    return `
      <a class="person-card" href="${profilePage}">
        <div class="person-photo">${photoSrc}</div>
        <div class="person-name">${person.name}</div>
        <div class="person-role">${person.role}${person.affiliation ? ' · ' + person.affiliation : ''}</div>
        <div class="person-links">${links}</div>
      </a>`;
  }

  async function loadPeople() {
    try {
      const res = await fetch(SHEET_CSV_URL);
      const text = await res.text();
      const people = parseCSV(text);

      const container = document.getElementById('people-container');
      container.innerHTML = SECTIONS.map(({ key, label }) => {
        const group = people.filter(p => p.section && p.section.toLowerCase() === key);
        if (!group.length) return '';
        return `
          <section class="people-section">
            <h2 class="section-title">${label}</h2>
            <div class="people-grid">${group.map(personCard).join('')}</div>
          </section>`;
      }).join('');

    } catch (err) {
      document.getElementById('people-container').innerHTML =
        '<div class="loading">Failed to load people data. Please try again later.</div>';
    }
  }

  loadPeople();
</script>

</body>
</html>
